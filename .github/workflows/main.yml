name: Continuous Integration

on:
  push:
    branches:
      - "*"
    tags:
      - "*"
  pull_request:
    branches:
      - "main"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build_sdist:
    name: sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build --sdist --outdir dist-sdist .

      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist-sdist/*.tar.gz

  build_wheels_linux:
    name: wheels for ${{ matrix.cfg.os }} / ${{ matrix.cfg.arch }}
    runs-on: ${{ matrix.cfg.os }}
    strategy:
      fail-fast: false
      matrix:
        cfg:
        - { os: ubuntu-24.04, arch: x86_64 }
        - { os: ubuntu-24.04-arm, arch: aarch64 }

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.4
        env:
          CIBW_ARCHS: ${{ matrix.cfg.arch }}
        with:
          output-dir: dist-wheel-${{ matrix.cfg.os }}-${{ matrix.cfg.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-wheel-${{ matrix.cfg.os }}-${{ matrix.cfg.arch }}
          path: ./dist-wheel-${{ matrix.cfg.os }}-${{ matrix.cfg.arch }}/*.whl

  build_wheels_macos:
    name: wheels for ${{ matrix.cfg.os }} / ${{ matrix.cfg.arch }}
    runs-on: ${{ matrix.cfg.os }}
    strategy:
      fail-fast: false
      matrix:
        cfg:
        - { os: macos-15, arch: arm64 }
        - { os: macos-15-intel, arch: x86_64 }

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Setup Micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: build
          init-shell: bash
          create-args: >-
            libnetcdf --channel conda-forge

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.4
        env:
          CIBW_ARCHS: ${{ matrix.cfg.arch }}
        with:
          output-dir: dist-wheel-${{ matrix.cfg.os }}-${{ matrix.cfg.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-wheel-${{ matrix.cfg.os }}-${{ matrix.cfg.arch }}
          path: ./dist-wheel-${{ matrix.cfg.os }}-${{ matrix.cfg.arch }}/*.whl

  build_wheels_windows:
    name: wheels for windows-latest / AMD64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Setup Intel Fortran
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: intel
          version: '2025.0'

      - name: Setup Micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: build
          init-shell: bash
          create-args: >-
            libnetcdf pkg-config --channel conda-forge

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.4
        env:
          CIBW_ARCHS: AMD64
        with:
          output-dir: dist-wheel-windows-latest-AMD64

      - uses: actions/upload-artifact@v4
        with:
          name: dist-wheel-windows-latest-AMD64
          path: ./dist-wheel-windows-latest-AMD64/*.whl

  upload_to_pypi:
    needs: [build_wheels_linux, build_wheels_macos, build_wheels_windows, build_sdist]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: Publish to Test PyPI
        # only if working on main
        if: github.ref == 'refs/heads/main'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.test_pypi_api_token }}
          repository_url: https://test.pypi.org/legacy/
          skip_existing: true

      - name: Publish to PyPI
        # only if tagged
        if: startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.pypi_api_token }}
