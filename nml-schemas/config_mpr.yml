title: MPR configuration
description: Configuration for the multiscale parameter regionalization in mHM.
x-fortran-namelist: config_mpr
type: object
properties:
  soil_db_mode:
    type: array
    items:
      type: integer
      x-fortran-kind: i4
      enum: [0, 1]
      default: 0
    x-fortran-shape: max_domains
    title: Soil database mode
    description: |-
      Flag to handle multiple soil database types; valid for all domains.
      - 0: classical mHM soil database with soil_class.asc and soil_classdefinition.txt.
        Soil horizons follow nSoilHorizons_mHM and soil_Depth for n-1 layers; last layer depth comes from the LUT.
      - 1: harmonised horizon-specific soil database with soil_class_horizon_XX.asc and soil_classdefinition_iFlag_soilDB_1.txt.
        Soil depth is provided for all horizons; the last horizon depth is fixed and uniform;
        tillage depth must match a horizon depth.
  n_horizons:
    type: array
    items:
      type: integer
      x-fortran-kind: i4
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Number of soil horizons
    description: Number of soil horizons to be modeled (nSoilHorizons_mHM).
  tillage_depth:
    type: array
    items:
      type: integer
      x-fortran-kind: i4
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Tillage depth
    description: Soil depth down to which organic matter is possible [mm].
  soil_depth:
    type: array
    items:
      type: integer
      x-fortran-kind: i4
    x-fortran-shape: [max_layers, max_domains]
    x-fortran-flex-tail-dims: 2
    title: Soil horizon depth
    description: |-
      Bottom depth of soil horizons with respect to the ground surface [mm], positive downwards.
      - if soil_db_mode = 0: provide depths for horizons 1..n-1; last horizon depth comes from the LUT.
      - if soil_db_mode = 1: provide depths for all horizons 1..n; a soil_class_horizon_XX.asc is required for each.
      Tillage depth should match one of the specified horizon depths.
  fracSealed_cityArea:
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Sealed fraction of city area
    description: Fraction of area within city assumed to be fully sealed [0.0-1.0].
  land_cover_path:
    type: array
    items:
      type: string
      x-fortran-len: buf
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Land cover path
    description: Land cover data path (periods derived from time bounds or start time stamp assumed).
  lai_time_step:
    type: array
    items:
      type: integer
      x-fortran-kind: i4
      enum: [-3, -2, -1, 0, 1]
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: LAI time step
    description: |-
      Time step for LAI input data [days]:
      - if = 1: annual cycle monthly gridded LAI values;
      - if = 0: no LAI input data used, static LAI from LUT;
      - if = -1 : daily gridded LAI input data;
      - if = -2 : monthly gridded LAI input data;
      - if = -3 : yearly gridded LAI input data;
  lai_path:
    type: array
    items:
      type: string
      x-fortran-len: buf
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: LAI path
    description: LAI data path (if `lai_time_step` < 0 or = 1).
  soil_lut_path:
    type: array
    items:
      type: string
      x-fortran-len: buf
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Soil LUT path
    description: Soil look-up table path.
  geo_lut_path:
    type: array
    items:
      type: string
      x-fortran-len: buf
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Geology LUT path
    description: Geology look-up table path.
  lai_lut_path:
    type: array
    items:
      type: string
      x-fortran-len: buf
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: LAI LUT path
    description: LAI look-up table path.
